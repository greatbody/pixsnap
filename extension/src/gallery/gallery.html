<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>PixSnap Gallery</title>
  <link rel="stylesheet" href="gallery.css">
</head>
<body>
  <div id="app">
    <!-- Top Bar -->
    <header class="topbar">
      <div class="topbar-left">
        <h1 class="logo">PixSnap</h1>
        <span class="image-count" id="image-count"></span>
      </div>
      <div class="topbar-center">
        <div class="search-box">
          <svg class="search-icon" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/>
          </svg>
          <input type="text" id="search-input" placeholder="Search images..." autocomplete="off">
        </div>
      </div>
      <div class="topbar-right">
        <div class="view-toggle">
          <button class="view-btn active" id="btn-grid-view" title="Grid view">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <rect x="3" y="3" width="7" height="7" rx="1"/><rect x="14" y="3" width="7" height="7" rx="1"/>
              <rect x="3" y="14" width="7" height="7" rx="1"/><rect x="14" y="14" width="7" height="7" rx="1"/>
            </svg>
          </button>
          <button class="view-btn" id="btn-list-view" title="List view">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="currentColor">
              <rect x="3" y="4" width="18" height="3" rx="1"/><rect x="3" y="10.5" width="18" height="3" rx="1"/>
              <rect x="3" y="17" width="18" height="3" rx="1"/>
            </svg>
          </button>
        </div>
        <button class="btn-icon" id="btn-select-mode" title="Select mode">
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
            <polyline points="9 11 12 14 22 4"/><path d="M21 12v7a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h11"/>
          </svg>
        </button>
      </div>
    </header>

    <!-- Sidebar: Tags -->
    <aside class="sidebar" id="sidebar">
      <div class="sidebar-header">
        <h2>Tags</h2>
      </div>
      <div class="tag-list" id="tag-list">
        <!-- dynamically populated -->
      </div>
    </aside>

    <!-- Main Content -->
    <main class="main" id="main">
      <!-- Bulk action bar (hidden by default) -->
      <div class="bulk-bar hidden" id="bulk-bar">
        <span id="selected-count">0 selected</span>
        <button class="btn btn-sm" id="btn-bulk-tag">Tag</button>
        <button class="btn btn-sm btn-danger" id="btn-bulk-delete">Delete</button>
        <button class="btn btn-sm btn-text" id="btn-cancel-select">Cancel</button>
      </div>

      <!-- Image Grid / List -->
      <div class="image-grid" id="image-container">
        <!-- dynamically populated -->
      </div>

      <!-- Loading indicator -->
      <div class="loading hidden" id="loading">
        <div class="spinner"></div>
        <span>Loading...</span>
      </div>

      <!-- Empty state -->
      <div class="empty-state hidden" id="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#ccc" stroke-width="1.5">
          <rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/>
          <polyline points="21 15 16 10 5 21"/>
        </svg>
        <p>No images found</p>
      </div>
    </main>

    <!-- Lightbox / Detail View -->
    <div class="lightbox hidden" id="lightbox">
      <div class="lightbox-backdrop" id="lightbox-backdrop"></div>
      <div class="lightbox-content">
        <button class="lightbox-close" id="lightbox-close">&times;</button>
        <button class="lightbox-nav lightbox-prev" id="lightbox-prev">&lsaquo;</button>
        <div class="lightbox-image-wrap">
          <img id="lightbox-image" src="" alt="">
        </div>
        <button class="lightbox-nav lightbox-next" id="lightbox-next">&rsaquo;</button>
        <div class="lightbox-sidebar" id="lightbox-sidebar">
          <h3 id="detail-filename"></h3>
          <div class="detail-meta">
            <div class="detail-row"><span class="label">Size</span><span id="detail-size"></span></div>
            <div class="detail-row"><span class="label">Dimensions</span><span id="detail-dimensions"></span></div>
            <div class="detail-row"><span class="label">Type</span><span id="detail-type"></span></div>
            <div class="detail-row"><span class="label">Mode</span><span id="detail-mode"></span></div>
            <div class="detail-row"><span class="label">Captured</span><span id="detail-date"></span></div>
            <div class="detail-row"><span class="label">Source</span><a id="detail-source" href="#" target="_blank" rel="noopener"></a></div>
          </div>
          <div class="detail-tags">
            <span class="label">Tags</span>
            <div id="detail-tag-list" class="tag-chips"></div>
            <div class="tag-input-group">
              <input type="text" id="detail-tag-input" placeholder="Add tag...">
              <button class="btn btn-sm" id="btn-add-tag">Add</button>
            </div>
          </div>
          <div class="detail-actions">
            <a class="btn btn-sm" id="btn-download" download>Download</a>
            <button class="btn btn-sm btn-danger" id="btn-delete-single">Delete</button>
          </div>
        </div>
      </div>
    </div>

    <!-- Tag Dialog -->
    <div class="dialog hidden" id="tag-dialog">
      <div class="dialog-backdrop"></div>
      <div class="dialog-box">
        <h3>Add Tags</h3>
        <input type="text" id="bulk-tag-input" placeholder="Enter tags (comma-separated)">
        <div class="dialog-actions">
          <button class="btn btn-sm" id="btn-confirm-tag">Apply</button>
          <button class="btn btn-sm btn-text" id="btn-cancel-tag">Cancel</button>
        </div>
      </div>
    </div>

    <!-- Delete Confirmation Dialog -->
    <div class="dialog hidden" id="delete-dialog">
      <div class="dialog-backdrop"></div>
      <div class="dialog-box">
        <h3>Delete Images</h3>
        <p id="delete-message">Are you sure you want to delete the selected images? This action cannot be undone.</p>
        <div class="dialog-actions">
          <button class="btn btn-sm btn-danger" id="btn-confirm-delete">Delete</button>
          <button class="btn btn-sm btn-text" id="btn-cancel-delete">Cancel</button>
        </div>
      </div>
    </div>
  </div>

  <script src="gallery.js" type="module"></script>
</body>
</html>
