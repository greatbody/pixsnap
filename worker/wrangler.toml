#:schema node_modules/wrangler/config-schema.json

name = "pixsnap-worker"
main = "src/index.ts"
compatibility_date = "2025-03-30"

[vars]
ALLOWED_ORIGINS = ""

[[d1_databases]]
binding = "DB"
database_name = "pixsnap-db"
database_id = "1d4d3c64-086b-4c42-94b0-e8b71d269ed7"
migrations_dir = "migrations"

[[r2_buckets]]
binding = "IMAGES_BUCKET"
bucket_name = "pixsnap-images"
